<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>حاسبة استحقاقات - شركة نفط الشمال</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1b5e20"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NOC Calculator"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="description" content="حاسبة استحقاقات موظفي شركة نفط الشمال"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans Arabic','Segoe UI',sans-serif;direction:rtl;background:#0d0d0d;min-height:100vh;color:#e8e8e8}
  #app{max-width:480px;margin:0 auto;padding-bottom:80px}

  /* Header */
  .header{position:relative;overflow:hidden;background:linear-gradient(135deg,#0a2a0a,#1a3a1a,#0f2f0f);padding:20px 16px 24px}
  .header-grad{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 30% 50%,rgba(76,175,80,0.15) 0%,transparent 70%)}
  .header-content{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center}
  .app-title{font-size:20px;font-weight:800;color:#fff;letter-spacing:.5px}
  .app-subtitle{font-size:12px;color:#8bc34a;margin-top:2px}

  /* Save badge */
  .save-badge{position:absolute;top:12px;left:12px;border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;transition:opacity .3s;z-index:10}

  /* Clear button */
  .clear-btn{margin-top:10px;background:transparent;border:1px solid #F4433644;color:#F44336;border-radius:20px;padding:4px 14px;font-size:11px;cursor:pointer;font-weight:600}
  .clear-confirm{margin-top:10px;display:flex;gap:8px;align-items:center;background:#2a0000;border-radius:20px;padding:6px 14px;border:1px solid #F44336}
  .confirm-yes{background:#F44336;border:none;color:#fff;border-radius:10px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:700}
  .confirm-no{background:#1a1a1a;border:1px solid #444;color:#aaa;border-radius:10px;padding:3px 10px;font-size:11px;cursor:pointer}

  /* Card */
  .card{margin:12px 12px 0;background:#1a1a1a;border-radius:16px;padding:14px 16px;border:1px solid #2a2a2a}
  .section-title{font-size:14px;font-weight:700;color:#8bc34a;margin-bottom:12px;display:flex;align-items:center;gap:6px}

  /* Form */
  .row{display:flex;gap:10px;margin-bottom:10px}
  .field{flex:1}
  .field label{font-size:11px;color:#888;display:block;margin-bottom:4px}
  .field input,.field select{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:10px 12px;color:#e8e8e8;font-size:13px;outline:none;font-family:inherit;direction:rtl}
  .field input[type=date]{text-align:center}
  .field input.error,.field select.error{border-color:#f55}
  .calc-btn{width:100%;margin-top:10px;background:linear-gradient(135deg,#4CAF50,#2d7a30);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .form-error-msg{margin-top:8px;background:#1e0000;border:1px solid #f5554433;border-radius:8px;padding:8px 12px;color:#f77;font-size:12px;text-align:center}

  /* Tabs */
  .tab-bar{position:sticky;top:0;z-index:100;display:flex;background:#111;border-bottom:1px solid #222;margin-top:12px}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;color:#666;cursor:pointer;font-family:inherit}
  .tab-btn .tab-icon{font-size:15px}
  .tab-btn .tab-label{font-size:9px}
  .tab-btn.active{color:#4CAF50;border-bottom:2px solid #4CAF50}
  .tab-content{padding:0 0 12px}

  /* Big card */
  .big-card{margin:12px 12px 0;background:linear-gradient(135deg,#0d2a0d,#1a3d1a);border-radius:20px;padding:24px 20px;text-align:center;border:1px solid #2d4a2d}
  .big-card-label{font-size:13px;color:#8bc34a;margin-bottom:8px}
  .big-card-value{font-size:36px;font-weight:900;color:#fff;line-height:1}
  .big-card-sub{font-size:12px;color:#666;margin-top:8px}
  .unit{font-size:14px;color:#8bc34a}

  /* Info row */
  .info-row{display:flex;gap:10px;margin:10px 12px 0}
  .info-box{flex:1;background:#1a1a1a;border-radius:12px;padding:12px;text-align:center;border:1px solid #2a2a2a}
  .info-label{font-size:11px;color:#666;margin-bottom:4px}
  .info-value{font-size:16px;font-weight:700;color:#fff}

  /* Promotion card */
  .promo-card{margin:10px 12px 0;background:linear-gradient(135deg,#1a1200,#2a2000);border-radius:16px;padding:16px;border:1px solid #3a3000}
  .promo-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .promo-title{font-size:15px;font-weight:700;color:#FFD700}
  .promo-dates{display:flex;gap:8px;margin-bottom:10px}
  .promo-date-box{flex:1;background:#111;border-radius:10px;padding:10px 14px;border:1px solid #222}
  .promo-date-box.effective{border-color:#FFD70066}
  .promo-date-box.faded{opacity:.55}
  .promo-date-label{font-size:11px;color:#666;margin-bottom:4px}
  .promo-date{font-size:14px;font-weight:600;color:#FFD700}
  .promo-date.small{font-size:12px;color:#aaa}
  .reduction-badge{display:flex;align-items:center;gap:8px;background:#2a2000;border-radius:10px;padding:8px 12px;margin-bottom:10px;color:#ccc;font-size:13px;border:1px solid #FFD70033}
  .countdown{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;background:#111;border-radius:10px;padding:10px;margin-bottom:10px;align-items:center}
  .cd-num{font-size:24px;font-weight:900;color:#FF9800}
  .cd-unit{font-size:12px;color:#888;margin-left:2px;margin-right:8px}
  .cd-label{width:100%;text-align:center;font-size:11px;color:#aaa;margin-top:4px}
  .eligible{text-align:center;background:#0d2a0d;border-radius:10px;padding:12px;color:#4CAF50;font-weight:700;margin-bottom:10px}
  .overdue-box{background:#2a0000;border:1px solid #F4433655;border-radius:10px;padding:10px 14px;margin-top:8px;text-align:center}
  .raise-row{display:flex;justify-content:space-between;align-items:center;background:#111;border-radius:10px;padding:10px 14px}
  .raise-label{font-size:13px;color:#888}
  .raise-val{font-size:15px;font-weight:700;color:#4CAF50}

  /* Progress */
  .progress-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:8px}
  .progress-track{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-bottom:10px}
  .progress-fill{height:100%;background:linear-gradient(90deg,#4CAF50,#8bc34a);border-radius:4px}
  .stage-grid{display:flex;gap:4px;flex-wrap:wrap}
  .stage-dot{width:32px;height:32px;border-radius:8px;background:#222;display:flex;align-items:center;justify-content:center;font-size:12px;color:#555;font-weight:600}
  .stage-dot.active{background:#1a3a1a;color:#4CAF50}
  .stage-dot.current{background:#4CAF50;color:#fff;box-shadow:0 0 8px #4CAF50}

  /* Commendations */
  .comm-row{background:#111;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #2a2a2a}
  .comm-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .add-btn{background:#1a3a1a;border:1px solid #4CAF50;color:#4CAF50;border-radius:10px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit}
  .del-btn{margin-right:auto;background:#2a0000;border:none;color:#F44336;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:13px;font-family:inherit}
  .comm-fields{display:flex;gap:8px;flex-wrap:wrap}
  .comm-fields .field{flex:1;min-width:110px}
  .comm-effect{margin-top:8px;display:flex;justify-content:space-between;background:#0d0d0d;border-radius:8px;padding:6px 10px}

  /* Retirement */
  .retire-big{margin:12px 12px 0;border-radius:20px;padding:24px 20px;text-align:center}
  .retire-countdown{margin:10px 12px 0;background:#0f1a2a;border-radius:14px;padding:16px;border:1px solid #1565C033}
  .retire-box{text-align:center;background:#111;border-radius:10px;padding:12px 16px;min-width:70px;border:1px solid #1565C044}
  .service-duration{margin:10px 12px 0;background:linear-gradient(135deg,#0d2a0d,#1a3d1a);border-radius:14px;padding:16px;border:1px solid #2d4a2d}

  /* Ration */
  .ration-card{margin:10px 12px 0;border-radius:14px;padding:16px}
  .ration-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#111;border-radius:8px;margin-bottom:6px;border:1px solid #2a2a2a}
  .ration-total{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;margin-top:8px}
  .ration-verdict{margin-top:10px;text-align:center;padding:8px;border-radius:8px}

  /* Certificate */
  .shukr-card{margin:12px 12px 0;background:linear-gradient(135deg,#0d0d0d,#1a1a00);border:2px solid #FFD700;border-radius:20px;padding:20px 16px;text-align:center}
  .shukr-title{font-size:16px;font-weight:800;color:#FFD700;margin-bottom:16px;letter-spacing:1px}
  .shukr-body{line-height:2;color:#ccc;font-size:14px;text-align:center}

  /* Developer */
  .dev-card{margin:24px 12px;background:linear-gradient(135deg,#0d1a0d,#111);border:1px solid #2a3a2a;border-radius:18px;padding:32px 20px;text-align:center;position:relative;overflow:hidden}
  .dev-grad{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 30%,rgba(76,175,80,0.10) 0%,transparent 65%);pointer-events:none}
  .dev-phone{display:inline-flex;align-items:center;gap:10px;background:#1a3a1a;border:1px solid #4CAF5066;border-radius:12px;padding:12px 24px;color:#8bc34a;font-size:15px;font-weight:700;text-decoration:none;font-family:inherit}
  .storage-info{margin-top:24px;background:#0d0d0d;border-radius:12px;padding:14px;border:1px solid #1a2a1a;text-align:right}

  /* Empty state */
  .empty-state{text-align:center;padding:60px 20px;color:#444}
  .empty-state .empty-icon{font-size:48px}
  .empty-state p{font-size:15px;margin-top:12px}

  /* PDF bar */
  .pdf-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(to top,#0d0d0d 80%,transparent);padding:12px 16px 16px;z-index:200}
  .pdf-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1a3a5a,#0d2a4a);border:1px solid #1565C066;border-radius:14px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(21,101,192,.3);font-family:inherit}

  @media print{
    .no-print{display:none!important}
    body{background:#fff!important;color:#000!important}
  }


  /* ── AUTH ── */
  #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:#0d0d0d}
  .auth-card{width:100%;max-width:400px;background:#1a1a1a;border-radius:24px;padding:32px 24px;border:1px solid #2a2a2a;text-align:center}
  .auth-logo{font-size:52px;margin-bottom:12px}
  .auth-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
  .auth-sub{font-size:12px;color:#8bc34a;margin-bottom:28px}
  .auth-tabs{display:flex;background:#111;border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
  .auth-tab{flex:1;padding:8px;border:none;border-radius:9px;background:transparent;color:#666;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
  .auth-tab.active{background:#1a3a1a;color:#4CAF50}
  .auth-field{margin-bottom:14px;text-align:right}
  .auth-field label{font-size:11px;color:#888;display:block;margin-bottom:5px}
  .auth-field input{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:11px 14px;color:#e8e8e8;font-size:14px;outline:none;font-family:inherit}
  .auth-field input:focus{border-color:#4CAF50}
  .auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#4CAF50,#2d7a30);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
  .auth-btn:disabled{opacity:.5;cursor:not-allowed}
  .auth-msg{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:8px;display:none}
  .auth-msg.error{background:#2a0000;color:#f77;border:1px solid #f5554433;display:block}
  .auth-msg.success{background:#0d2a0d;color:#4CAF50;border:1px solid #4CAF5033;display:block}
  .auth-divider{border:none;border-top:1px solid #222;margin:20px 0}
  .auth-reset{background:none;border:none;color:#666;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline}
  .auth-reset:hover{color:#8bc34a}
  .user-bar{display:flex;align-items:center;gap:10px;background:#111;border-radius:12px;padding:8px 12px;margin:10px 12px 0;border:1px solid #1a3a1a}
  .user-email{flex:1;font-size:12px;color:#8bc34a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .logout-btn{background:#2a0000;border:1px solid #F4433644;color:#F44336;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:700;font-family:inherit}
  .google-btn{width:100%;padding:11px;background:#fff;border:1px solid #ddd;border-radius:12px;color:#444;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px}
  .google-btn:hover{background:#f5f5f5}

  /* Commend big card */
  .commend-big{margin:12px 12px 0;background:linear-gradient(135deg,#1a1200,#2d2000);border-radius:20px;padding:24px 20px;text-align:center;border:1px solid #2d4a2d}
</style>
<!-- Firebase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">🏛</div>
    <div class="auth-title">حاسبة استحقاقات</div>
    <div class="auth-sub">شركة نفط الشمال</div>

    <!-- ── شاشة 1: تسجيل دخول / إنشاء حساب ── -->
    <div id="auth-main">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">تسجيل الدخول</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">إنشاء حساب</button>
      </div>

      <!-- نموذج الدخول -->
      <div id="login-form">
        <div class="auth-field"><label>البريد الإلكتروني أو رقم الجوال</label><input type="text" id="login-email" placeholder="example@gmail.com أو 07XXXXXXXXX" dir="ltr" inputmode="email"/></div>
        <div class="auth-field"><label>كلمة المرور</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
        <button class="auth-btn" id="login-btn" onclick="doLogin()">🔐 دخول</button>
        <hr class="auth-divider"/>

        <hr class="auth-divider"/>
        <button class="auth-reset" onclick="doReset()">نسيت كلمة المرور؟</button>
      </div>

      <!-- نموذج التسجيل -->
      <div id="register-form" style="display:none">
        <div class="auth-field"><label>البريد الإلكتروني</label><input type="email" id="reg-email" placeholder="example@gmail.com" dir="ltr"/></div>
        <div class="auth-field"><label>رقم الموبايل</label><input type="tel" id="reg-phone" placeholder="+964 7XX XXX XXXX" dir="ltr"/></div>
        <div class="auth-field"><label>كلمة المرور (6 أحرف على الأقل)</label><input type="password" id="reg-pass" placeholder="••••••••"/></div>
        <div class="auth-field"><label>تأكيد كلمة المرور</label><input type="password" id="reg-pass2" placeholder="••••••••"/></div>
        <button class="auth-btn" id="reg-btn" onclick="doRegister()">✅ إنشاء الحساب</button>
      </div>
    </div>

    <!-- ── شاشة 2: إدخال كود OTP ── -->
    <div id="auth-otp" style="display:none">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;margin-bottom:10px" id="otp-icon">📧</div>
        <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px" id="otp-title">تحقق من بريدك الإلكتروني</div>
        <div style="font-size:12px;color:#8bc34a" id="otp-email-label"></div>
        <div style="font-size:11px;color:#666;margin-top:6px" id="otp-sub">أرسلنا كود التحقق إلى بريدك</div>
      </div>
      <div class="auth-field">
        <label>أدخل كود التحقق (6 أرقام)</label>
        <input type="text" id="otp-input" placeholder="_ _ _ _ _ _" maxlength="6" inputmode="numeric" dir="ltr"
          style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700"
          oninput="this.value=this.value.replace(/\D/g,'').slice(0,6); if(this.value.length===6) verifyOTP()"/>
      </div>
      <button class="auth-btn" id="otp-btn" onclick="verifyOTP()">✅ تحقق</button>
      <div style="text-align:center;margin-top:14px">
        <button class="auth-reset" onclick="resendOTP()" id="resend-btn">إعادة إرسال الكود</button>
        <span id="resend-timer" style="font-size:11px;color:#666;display:none"></span>
      </div>
      <div style="text-align:center;margin-top:8px">
        <button class="auth-reset" onclick="backToLogin()">← رجوع</button>
      </div>
    </div>

    <!-- ── شاشة 3: تغيير كلمة المرور ── -->
    <div id="auth-reset" style="display:none">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;margin-bottom:10px">🔑</div>
        <div style="font-size:15px;font-weight:700;color:#fff">استعادة كلمة المرور</div>
        <div style="font-size:12px;color:#666;margin-top:6px">أدخل بريدك أو رقم جوالك لإرسال كود التحقق</div>
      </div>
      <div class="auth-field"><label>البريد الإلكتروني أو رقم الجوال</label><input type="text" id="reset-email" placeholder="example@gmail.com أو 07XXXXXXXXX" dir="ltr"/></div>
      <button class="auth-btn" id="reset-btn" onclick="doResetSubmit()">📧 إرسال كود التحقق</button>
      <div style="text-align:center;margin-top:10px">
        <button class="auth-reset" onclick="backToLogin()">← رجوع</button>
      </div>
    </div>

    <!-- ── شاشة 4: كلمة المرور الجديدة (بعد OTP) ── -->
    <div id="auth-newpass" style="display:none">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;margin-bottom:10px">🔒</div>
        <div style="font-size:15px;font-weight:700;color:#fff">أدخل كلمة المرور الجديدة</div>
      </div>
      <div class="auth-field"><label>كلمة المرور الجديدة</label><input type="password" id="newpass1" placeholder="••••••••"/></div>
      <div class="auth-field"><label>تأكيد كلمة المرور</label><input type="password" id="newpass2" placeholder="••••••••"/></div>
      <button class="auth-btn" id="newpass-btn" onclick="doNewPassSubmit()">✅ تغيير كلمة المرور</button>
    </div>

    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<div id="app" style="display:none"></div>

<script>
// ══════════════════════════════════════
//  DATA
// ══════════════════════════════════════
const GRADES={1:"الأولى",2:"الثانية",3:"الثالثة",4:"الرابعة",5:"الخامسة",6:"السادسة",7:"السابعة",8:"الثامنة",9:"التاسعة",10:"العاشرة"};
const SALARY_SCALE={1:[910,930,950,970,990,1010,1030,1050,1070,1090,1110],2:[723,740,757,774,791,808,825,842,859,876,893],3:[600,610,620,630,640,650,660,670,680,690,700],4:[490,500,510,520,530,540,550,560,570,580,590],5:[429,435,441,447,453,459,465,471,477,483,489],6:[362,368,374,380,386,392,398,404,410,416,422],7:[296,302,308,314,320,326,332,338,344,350,356],8:[260,263,266,269,272,275,278,281,284,287,290],9:[210,213,216,219,222,225,228,231,234,237,240],10:[170,173,176,179,182,185,188,191,194,197,200]};
const ANNUAL_RAISE={1:20,2:17.5,3:10,4:8,5:6,6:6,7:6,8:4,9:4,10:4};
const CERT_ALLOWANCES={doctorate:100,masters:75,high_diploma:55,bachelor:45,diploma:35,preparatory:25};
const DANGER_RATES={high:30,medium:26};
const STAGE_DAYS={1:1825,2:1825,3:1825,4:1825,5:1825,6:1460,7:1460,8:1460,9:1460,10:1460};
const getStageDays=g=>STAGE_DAYS[g]||1460;
const DEFAULT_TYPES=[
  {id:"pm",      label:"شكر وتقدير رئيس الوزراء",     daysReduction:180,color:"#FFD700",icon:"🏅"},

  {id:"company", label:"شكر وتقدير شركة أو جهة أخرى", daysReduction:30, color:"#CD7F32",icon:"🥈"},
];

  {id:"service",   label:"الخدمة",          icon:"⏱"},
  {id:"commend",   label:"الشكر والتقدير",  icon:"🎖"},
  {id:"retire",    label:"تاريخ التقاعد",   icon:"🎓"},

let state = {
  tab:"service",
  form:{name:"",employeeId:"",birthDate:"",hireDate:"",grade:"7",stage:"1",certificate:"bachelor",dangerLevel:"medium",position:"normal",maritalStatus:"single",children:"0",workLocation:"60",lastPromotionDate:"",lastRaiseDate:""},
  commTypes:DEFAULT_TYPES.map(t=>({...t})),
  commendations:[],

  storageStatus:"idle",
  showClearConfirm:false,
};

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
const fmt=n=>(n??0).toLocaleString("en-US");
const fmtDur=days=>{const d=Math.max(0,days);return{years:Math.floor(d/365),months:Math.floor((d%365)/30),days:d%30,total:d};};
const fmtDate=d=>d instanceof Date&&!isNaN(d)?d.toLocaleDateString("en-GB",{year:"numeric",month:"2-digit",day:"2-digit"}):"—";
const fmtDateStr=s=>s?fmtDate(new Date(s)):"—";

// ══════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════
let saveTimer=null;
function scheduleSave(){
  state.storageStatus="saving";render();
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify({form:state.form,commTypes:state.commTypes,commendations:state.commendations}));
      state.storageStatus="saved";render();
      setTimeout(()=>{state.storageStatus="idle";render();},2000);
    }catch{
      state.storageStatus="error";render();
      setTimeout(()=>{state.storageStatus="idle";render();},3000);
    }
  },800);
}
function loadSaved(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const saved=JSON.parse(raw);
    if(saved.form)        state.form={...state.form,...saved.form};
    if(saved.commTypes)   state.commTypes=saved.commTypes;
    if(saved.commendations)state.commendations=saved.commendations;
    state.storageStatus="loaded";
    setTimeout(()=>{state.storageStatus="idle";render();},2500);
  }catch{}
}
function clearData(){
  localStorage.removeItem(STORAGE_KEY);
  state.form={name:"",employeeId:"",birthDate:"",hireDate:"",grade:"7",stage:"1",certificate:"bachelor",dangerLevel:"medium",position:"normal",maritalStatus:"single",children:"0",workLocation:"60",lastPromotionDate:"",lastRaiseDate:""};
  state.commTypes=DEFAULT_TYPES.map(t=>({...t}));
  state.commendations=[];
  state.result=null;
  state.formErrors={};
  state.showClearConfirm=false;
  state.storageStatus="idle";
  render();
}

// ══════════════════════════════════════
//  CALCULATE
// ══════════════════════════════════════
function getEffectiveDays(c){
  if(c.customDays!==null&&c.customDays!=="")return parseInt(c.customDays)||0;
  const t=state.commTypes.find(x=>x.id===c.type);
  return t?t.daysReduction:0;
}
function calculate(){
  const {hireDate,grade,stage,certificate,dangerLevel,position,maritalStatus,children,workLocation,lastPromotionDate}=state.form;
  if(!hireDate){state.result=null;return;}
  const currentDate=new Date().toISOString().split("T")[0];
  const totalDays=Math.floor((new Date(currentDate)-new Date(hireDate))/86400000);
  const duration=fmtDur(totalDays);
  const totalYears=totalDays/365;
  const stageNum=parseInt(stage),gradeNum=parseInt(grade);
  const BASE=getStageDays(gradeNum);
  const hDate=new Date(hireDate);
  const today=new Date(currentDate);

  const stageStart=lastPromotionDate?new Date(lastPromotionDate):(()=>{const d=new Date(hDate);d.setFullYear(hDate.getFullYear()+(stageNum-1)*2);return d;})();
  const raiseBase=state.form.lastRaiseDate?new Date(state.form.lastRaiseDate):new Date(hireDate);

  const promoReductionDays=state.commendations.reduce((s,c)=>{if(!c.date)return s;if(new Date(c.date)<=stageStart)return s;return s+getEffectiveDays(c);},0);
  const raiseReductionDays=state.commendations.reduce((s,c)=>{if(!c.date)return s;if(new Date(c.date)<=raiseBase)return s;return s+getEffectiveDays(c);},0);

  const reductionDays=promoReductionDays;
  const daysFromStageStart=Math.max(0,Math.ceil((today-stageStart)/86400000));
  const daysRemainingOrig=Math.max(0,BASE-daysFromStageStart);
  const daysRemainingEff=Math.max(0,daysRemainingOrig-promoReductionDays);
  const overdueOrig=daysRemainingOrig===0?Math.max(0,daysFromStageStart-BASE):0;
  const overdueEff=daysRemainingEff===0?Math.max(0,daysFromStageStart-(BASE-promoReductionDays)):0;

  const nextStageDateOriginal=new Date(stageStart);nextStageDateOriginal.setDate(stageStart.getDate()+BASE);
  const nextStageDateEffective=new Date(nextStageDateOriginal);nextStageDateEffective.setDate(nextStageDateEffective.getDate()-promoReductionDays);
  const daysToNext=Math.max(0,Math.ceil((nextStageDateEffective-today)/86400000));
  const nextStageDuration=fmtDur(daysToNext);
  const nextStageNum=Math.min(stageNum+1,11);
  const annualRaise=ANNUAL_RAISE[gradeNum]*1000;

  const annualRaiseDateOrig=new Date(raiseBase);annualRaiseDateOrig.setFullYear(raiseBase.getFullYear()+1);
  const annualRaiseDate=new Date(annualRaiseDateOrig);annualRaiseDate.setDate(annualRaiseDate.getDate()-raiseReductionDays);

  const baseSalary=(SALARY_SCALE[gradeNum]?.[stageNum-1]||0)*1000;
  const certAllowance=Math.round(baseSalary*(CERT_ALLOWANCES[certificate]||0)/100);
  const specialAllowance=Math.round(baseSalary*0.30);
  const dangerAllowance=Math.round(baseSalary*DANGER_RATES[dangerLevel]/100);
  let positionAllowance=0;
  if(position==="deputy_dg")positionAllowance=Math.round(baseSalary*0.30);
  else if(position==="board_director")positionAllowance=Math.round(baseSalary*0.25);
  else if(position==="dept_director")positionAllowance=Math.round(baseSalary*0.20);
  else if(position==="section_chief")positionAllowance=Math.round(baseSalary*0.15);
  const maritalAllowance=maritalStatus==="married"?50000:0;
  const childrenAllowance=Math.min(parseInt(children),4)*10000;
  const locationAllowance=parseInt(workLocation)*1000;
  const totalAllowances=certAllowance+specialAllowance+dangerAllowance+positionAllowance+maritalAllowance+childrenAllowance+locationAllowance;
  const retirementDed=Math.round(baseSalary*0.10),supportFundDed=1000,orphansDed=1000;
  const stampDed=Math.round(2000000/12),socialDed=Math.round(baseSalary*0.00205);
  const netBT=baseSalary+locationAllowance-retirementDed;
  let taxAmount=0;
  if(netBT>83333){if(netBT<=166666)taxAmount=Math.round((netBT-83333)*0.03+83333*0.03);else if(netBT<=333333)taxAmount=Math.round((netBT-166666)*0.05+166666*0.03);else taxAmount=Math.round((netBT-333333)*0.10+333333*0.08);}
  const totalDeductions=retirementDed+supportFundDed+orphansDed+stampDed+socialDed+taxAmount;
  const netSalary=baseSalary+totalAllowances-totalDeductions;
  const commByType={};
  state.commTypes.forEach(t=>{commByType[t.id]=state.commendations.filter(c=>c.type===t.id).length;});

  state.result={duration,totalDays,totalYears,nextStageDateOriginal,nextStageDateEffective,nextStageDuration,nextStageNum,daysToNext,reductionDays,overdueOrig,overdueEff,commByType,baseSalary,annualRaise,annualRaiseDate,allowances:{cert:certAllowance,special:specialAllowance,danger:dangerAllowance,position:positionAllowance,marital:maritalAllowance,children:childrenAllowance,location:locationAllowance},totalAllowances,deductions:{retirement:retirementDed,support:supportFundDed,orphans:orphansDed,stamp:stampDed,social:socialDed,tax:taxAmount},totalDeductions,netSalary};
}

function validateForm(){
  const e={};
  if(!state.form.name.trim())e.name=true;
  if(!/^\d{6}$/.test(state.form.employeeId.trim()))e.employeeId=true;
  if(!state.form.birthDate)e.birthDate=true;
  if(!state.form.hireDate)e.hireDate=true;
  if(!state.form.lastPromotionDate)e.lastPromotionDate=true;
  if(!state.form.lastRaiseDate)e.lastRaiseDate=true;
  state.formErrors=e;
  return Object.keys(e).length===0;
}

  const combinedAmt=Math.round(base*(dangerPct+certPct+specialPct)/100);
  const maritalAmt=r.allowances.marital;

  const total=base+combinedAmt+maritalAmt+childrenAmt+locationAmt;
  const threshold=1500000;
  const exceeded=total>=threshold;
  const rows=[
    {label:"الراتب الاسمي",val:base,color:"#e8e8e8"},
    {label:"مخصصات الزوجية",val:maritalAmt,color:"#42A5F5"},
    {label:"مخصصات الأطفال",val:childrenAmt,color:"#AB47BC"},

    <div style="font-size:13px;color:${exceeded?"#F44336":"#4CAF50"};font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px"><span>🛒</span> إيقاف البطاقة التموينية</div>

      <span style="font-size:14px;font-weight:700;color:${exceeded?"#F44336":"#4CAF50"}">المجموع</span>
      <span style="font-size:16px;font-weight:900;color:${exceeded?"#F44336":"#4CAF50"};font-family:monospace">${fmt(total)} <span style="font-size:11px">د.ع</span></span>
    </div>
    <div class="ration-verdict" style="background:${exceeded?"#3a0000":"#0a2a0a"};border:1px solid ${exceeded?"#F4433655":"#4CAF5055"}">
      <span style="font-size:13px;font-weight:700;color:${exceeded?"#F44336":"#4CAF50"}">${exceeded?"🔴 يستوجب إيقاف البطاقة التموينية":"🟢 لا يستوجب إيقاف البطاقة التموينية"}</span>

// ── تشفير كلمة المرور ──
async function _hash(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// ── الجلسة ──
function _saveSession(email, phone) {
  localStorage.setItem(_SESSION_KEY, JSON.stringify({ email, phone: phone||"", ts: Date.now() }));
  window._currentUser = { email, phone: phone||"" };
}
function _loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem(_SESSION_KEY) || "null");
    if (s && (Date.now() - s.ts) < 30 * 24 * 3600 * 1000) return s;
    return null;
  } catch { return null; }
}

// ── OTP ──
let _otpStore = null;
let _resendTimer = null;

function _generateOTP() {
  return String(Math.floor(100000 + Math.random() * 900000));
}

// تحويل رقم الجوال العراقي إلى صيغة دولية
function _toIntlPhone(phone) {
  const p = phone.replace(/[\s\-]/g,"");
  if (p.startsWith("+")) return p.replace("+","");
  if (p.startsWith("07")) return "964" + p.slice(1);
  return p;
}

// إرسال OTP عبر البريد الإلكتروني
async function _sendOTPEmail(email, code) {
  emailjs.init({ publicKey: _EJS_PUBLIC });
  await emailjs.send(_EJS_SERVICE, _EJS_TEMPLATE, {
    to_email: email,
    otp_code: code,
    app_name: "حاسبة استحقاقات — شركة نفط الشمال",
    expires_in: "10 دقائق"
  });
}

// إرسال OTP عبر واتساب (UltraMsg)
async function _sendOTPWhatsApp(phone, code) {
  const intlPhone = _toIntlPhone(phone);
  const msg = `🔐 كود التحقق لحاسبة استحقاقات شركة نفط الشمال:\n\n*${code}*\n\nصالح لمدة 10 دقائق. لا تشاركه مع أحد.`;
  console.log("📱 إرسال واتساب إلى:", intlPhone);
  const res = await fetch(`https://api.ultramsg.com/${_WA_INSTANCE}/messages/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: _WA_TOKEN, to: intlPhone, body: msg, priority: 1 })
  });
  const data = await res.json();
  console.log("📩 استجابة UltraMsg:", data);
  if (data.error) throw new Error(data.error);
  return data;
}

// إرسال OTP — يختار القناة تلقائياً (جوال → واتساب، بريد → إيميل)
async function _sendOTP(identifier, purpose) {
  const code = _generateOTP();
  const isPhone = /^(\+9647|07)\d{9}$/.test(identifier.replace(/[\s\-]/g,""));
  _otpStore = { code, identifier, isPhone, expires: Date.now() + 10 * 60 * 1000, purpose };
  if (isPhone) {
    await _sendOTPWhatsApp(identifier, code); // يرمي خطأ إذا فشل
  } else {
    try { await _sendOTPEmail(identifier, code); } catch(e) { console.warn("EmailJS:", e); }
  }
  return code;
}

function backToLogin() {
  _otpStore = null;
  document.getElementById("auth-otp").style.display    = "none";
  document.getElementById("auth-reset").style.display  = "none";
  document.getElementById("auth-newpass").style.display = "none";
  document.getElementById("auth-main").style.display   = "block";
  document.getElementById("auth-msg").className = "auth-msg";
  if (_resendTimer) clearInterval(_resendTimer);
}

function _startResendTimer(seconds) {
  const btn = document.getElementById("resend-btn");
  const tmr = document.getElementById("resend-timer");
  btn.style.display = "none";
  tmr.style.display = "inline";
  let r = seconds;
  if (_resendTimer) clearInterval(_resendTimer);
  _resendTimer = setInterval(() => {
    r--;
    tmr.textContent = "إعادة الإرسال بعد " + r + "s";
    if (r <= 0) { clearInterval(_resendTimer); tmr.style.display = "none"; btn.style.display = "inline"; }
  }, 1000);
}

window.verifyOTP = async function() {

  if (input.length !== 6)              { showAuthMsg("أدخل الكود المكون من 6 أرقام", "error"); return; }
  if (!_otpStore)                      { showAuthMsg("انتهت الجلسة، أعد المحاولة", "error"); backToLogin(); return; }
  if (Date.now() > _otpStore.expires)  { showAuthMsg("انتهت صلاحية الكود، أعد الإرسال", "error"); return; }
  if (input !== _otpStore.code)        { showAuthMsg("الكود غير صحيح ❌", "error"); return; }

  btn.disabled = true; btn.textContent = "جارِ التحقق…";
  // identifier قد يكون بريد أو جوال — email دائماً البريد المرتبط
  const { identifier, purpose } = _otpStore;
  const isPhone = _otpStore.isPhone;
  // إيجاد البريد المرتبط بالمعرّف
  let email = identifier;
  if (isPhone) {
    const users = _getUsers();
    const phone = identifier.replace(/[\s\-]/g,"");
    const found = Object.entries(users).find(([,u]) => u.phone && u.phone.replace(/[\s\-]/g,"") === phone);
    if (found) email = found[0];
  }
  _otpStore = null;

  try {
    if (purpose === "login") {
      const users = _getUsers();
      const phone = users[email]?.phone || "";
      _saveSession(email, phone);
      showAuthMsg("مرحباً ✅", "success");
      setTimeout(() => _showApp(), 600);

    } else if (purpose === "register") {
      const pass = sessionStorage.getItem("_reg_pass");
      const phone = sessionStorage.getItem("_reg_phone") || "";
      sessionStorage.removeItem("_reg_pass");
      sessionStorage.removeItem("_reg_phone");
      if (!pass) { showAuthMsg("انتهت الجلسة، أعد التسجيل", "error"); backToLogin(); return; }
      const users = _getUsers();
      const h = await _hash(pass);
      users[email] = { hash: h, phone, created: Date.now() };
      _saveUsers(users);
      _saveSession(email, phone);
      showAuthMsg("تم إنشاء الحساب بنجاح ✅", "success");
      setTimeout(() => _showApp(), 700);

    } else if (purpose === "reset") {
      sessionStorage.setItem("_reset_email", email);
      document.getElementById("auth-otp").style.display    = "none";
      document.getElementById("auth-newpass").style.display = "block";
      showAuthMsg("أدخل كلمة المرور الجديدة", "success");
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = "✅ تحقق";
    showAuthMsg("حدث خطأ، حاول مرة أخرى", "error");
  }
};

window.resendOTP = async function() {
  if (!_otpStore) { backToLogin(); return; }
  const { email, purpose } = _otpStore;
  showAuthMsg("جارِ إعادة الإرسال…", "success");
  await _sendOTP(email, purpose);
  showAuthMsg("تم إرسال كود جديد 📧", "success");
  _startResendTimer(60);
};

// ── تسجيل الدخول ──
window.doLogin = async function() {
  const raw  = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;
  const btn  = document.getElementById("login-btn");
  if (!raw || !pass) { showAuthMsg("يرجى إدخال البريد أو رقم الجوال وكلمة المرور", "error"); return; }

  const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw);
  const isPhone = /^(\+9647|07)\d{9}$/.test(raw.replace(/[\s\-]/g,""));
  if (!isEmail && !isPhone) { showAuthMsg("أدخل بريد إلكتروني صالح أو رقم جوال صالح", "error"); return; }

  btn.disabled = true; btn.textContent = "جارِ التحقق…";
  try {
    const users = _getUsers();
    let email = raw.toLowerCase();

    if (isPhone) {
      const phone = raw.replace(/[\s\-]/g,"");
      const found = Object.entries(users).find(([,u]) => u.phone && u.phone.replace(/[\s\-]/g,"") === phone);
      if (!found) { showAuthMsg("رقم الجوال غير مسجل", "error"); btn.disabled=false; btn.textContent="🔐 دخول"; return; }
      email = found[0];
    }

    if (!users[email]) { showAuthMsg("البريد غير مسجل", "error"); btn.disabled=false; btn.textContent="🔐 دخول"; return; }
    const h = await _hash(pass);
    if (users[email].hash !== h) { showAuthMsg("كلمة المرور غير صحيحة", "error"); btn.disabled=false; btn.textContent="🔐 دخول"; return; }
    await _sendOTP(isPhone ? raw : email, "login");
    showAuthMsg(isPhone ? "تم إرسال كود التحقق عبر واتساب 💬" : "تم إرسال كود التحقق إلى بريدك 📧", "success");
    btn.disabled=false; btn.textContent="🔐 دخول";
    _showOTPScreen(isPhone ? raw : email);
  } catch(e) {
    btn.disabled=false; btn.textContent="🔐 دخول";
    console.error("doLogin error:", e);
    showAuthMsg("فشل الإرسال: " + (e.message || "خطأ غير معروف"), "error");
  }
};

// ── إنشاء حساب ──
window.doRegister = async function() {
  const email = document.getElementById("reg-email").value.trim().toLowerCase();
  const pass  = document.getElementById("reg-pass").value;
  const pass2 = document.getElementById("reg-pass2").value;
  const btn   = document.getElementById("reg-btn");
  const phone = document.getElementById("reg-phone").value.trim();
  if (!email || !pass) { showAuthMsg("يرجى إدخال البريد وكلمة المرور", "error"); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAuthMsg("البريد غير صالح", "error"); return; }
  if (!phone) { showAuthMsg("يرجى إدخال رقم الجوال", "error"); return; }
  if (!/^(\+9647|07)\d{9}$/.test(phone.replace(/[\s\-]/g,""))) { showAuthMsg("رقم الجوال غير صالح (مثال: 07XXXXXXXXX)", "error"); return; }
  if (pass !== pass2)  { showAuthMsg("كلمتا المرور غير متطابقتين", "error"); return; }
  if (pass.length < 6) { showAuthMsg("كلمة المرور 6 أحرف على الأقل", "error"); return; }
  btn.disabled=true; btn.textContent="جارِ الإنشاء…";
  const users = _getUsers();
  if (users[email]) { showAuthMsg("هذا البريد مسجل مسبقاً", "error"); btn.disabled=false; btn.textContent="✅ إنشاء الحساب"; return; }
  sessionStorage.setItem("_reg_pass", pass);
  sessionStorage.setItem("_reg_phone", phone);
  try {
    await _sendOTP(phone, "register");
    showAuthMsg("تم إرسال كود التحقق عبر واتساب 💬", "success");
    btn.disabled=false; btn.textContent="✅ إنشاء الحساب";
    _showOTPScreen(phone);
  } catch(e) {
    btn.disabled=false; btn.textContent="✅ إنشاء الحساب";
    console.error("doRegister OTP error:", e);
    showAuthMsg("فشل الإرسال: " + (e.message || "تحقق من إعداد UltraMsg"), "error");
  }
};

// ── نسيت كلمة المرور — عرض شاشة البريد ──
window.doReset = function() {
  const raw = document.getElementById("login-email").value.trim().toLowerCase();
  const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw);
  document.getElementById("auth-main").style.display   = "none";
  document.getElementById("auth-reset").style.display  = "block";
  document.getElementById("auth-newpass").style.display = "none";
  if (isEmail) document.getElementById("reset-email").value = raw;
};

// ── إرسال OTP لاستعادة كلمة المرور ──
window.doResetSubmit = async function() {
  const raw  = document.getElementById("reset-email").value.trim();
  const btn  = document.getElementById("reset-btn");
  if (!raw) { showAuthMsg("أدخل البريد الإلكتروني أو رقم الجوال", "error"); return; }

  const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw);
  const isPhone = /^(\+9647|07)\d{9}$/.test(raw.replace(/[\s\-]/g,""));
  if (!isEmail && !isPhone) { showAuthMsg("أدخل بريد إلكتروني صالح أو رقم جوال صالح", "error"); return; }

  const users = _getUsers();
  let email = raw.toLowerCase();

  if (isPhone) {
    const phone = raw.replace(/[\s\-]/g,"");
    const found = Object.entries(users).find(([,u]) => u.phone && u.phone.replace(/[\s\-]/g,"") === phone);
    if (!found) { showAuthMsg("رقم الجوال غير مسجل", "error"); return; }
    email = found[0];
  } else {
    if (!users[email]) { showAuthMsg("البريد الإلكتروني غير مسجل", "error"); return; }
  }

  btn.disabled = true; btn.textContent = "جارِ الإرسال…";
  const identifier = isPhone ? raw : email;
  await _sendOTP(identifier, "reset");
  showAuthMsg(isPhone ? "تم إرسال كود التحقق عبر واتساب 💬" : "تم إرسال كود التحقق إلى البريد المرتبط 📧", "success");
  btn.disabled = false; btn.textContent = "📧 إرسال كود التحقق";
  document.getElementById("auth-reset").style.display = "none";
  _showOTPScreen(identifier);
};

// ── تغيير كلمة المرور بعد التحقق من OTP ──
window.doNewPassSubmit = async function() {
  const pass  = document.getElementById("newpass1").value;
  const pass2 = document.getElementById("newpass2").value;
  const btn   = document.getElementById("newpass-btn");
  if (!pass)           { showAuthMsg("أدخل كلمة المرور الجديدة", "error"); return; }
  if (pass.length < 6) { showAuthMsg("كلمة المرور 6 أحرف على الأقل", "error"); return; }
  if (pass !== pass2)  { showAuthMsg("كلمتا المرور غير متطابقتين", "error"); return; }
  btn.disabled = true; btn.textContent = "جارِ الحفظ…";
  const email = sessionStorage.getItem("_reset_email");
  const users = _getUsers();
  if (users[email]) {
    const h = await _hash(pass);
    users[email].hash = h;
    _saveUsers(users);
  }
  sessionStorage.removeItem("_reset_email");
  showAuthMsg("تم تغيير كلمة المرور بنجاح ✅", "success");
  setTimeout(() => backToLogin(), 1500);
};

// ── Google (غير متاح بدون Firebase) ──
window.doGoogleLogin = function() {
  showAuthMsg("استخدم البريد وكلمة المرور للدخول", "error");
};

// ── تسجيل الخروج ──
window.doLogout = function() {
  localStorage.removeItem(_SESSION_KEY);
  window._currentUser = null;
  _showAuth();
};

// ── عرض/إخفاء الشاشات ──
function _showApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  const bar = document.getElementById("user-bar");
  if (bar) bar.querySelector(".user-email").textContent = window._currentUser?.email || "مستخدم";
  if (typeof render === "function") render();
}
function _showAuth() {
  document.getElementById("auth-screen").style.display = "flex";
  document.getElementById("app").style.display = "none";
  backToLogin();
}

// ── تبديل التبويب ──
window.switchAuthTab = function(tab) {
  document.getElementById("login-form").style.display    = tab==="login"    ? "block" : "none";
  document.getElementById("register-form").style.display = tab==="register" ? "block" : "none";
  document.getElementById("tab-login").className    = "auth-tab" + (tab==="login"    ? " active" : "");
  document.getElementById("tab-register").className = "auth-tab" + (tab==="register" ? " active" : "");
  document.getElementById("auth-msg").className = "auth-msg";
};

function showAuthMsg(text, type) {
  const el = document.getElementById("auth-msg");
  el.textContent = text;
  el.className = "auth-msg " + type;
}

// ── فحص الجلسة عند التحميل ──
function _checkAuth() {
  const s = _loadSession();
  if (s?.email) {
    window._currentUser = { email: s.email, phone: s.phone || "" };
    _showApp();
  } else {
    _showAuth();
  }
}

// تشغيل فحص الجلسة بشكل موثوق في PWA وغير PWA
if (document.readyState === "complete" || document.readyState === "interactive") {
  setTimeout(_checkAuth, 0);
} else {
  window.addEventListener("load", _checkAuth);
  document.addEventListener("DOMContentLoaded", _checkAuth);
}

// ── تسجيل Service Worker للـ PWA ──
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("SW registered"))
      .catch(e => console.warn("SW error:", e));
  });
}
</script>
